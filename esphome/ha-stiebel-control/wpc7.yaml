#########################################
#   TEXT SENSOREN                       
#########################################
text_sensor:
  # Text sensors with lambdas (used to trigger CAN reads)
  - platform: template
    name: "PROGRAMMSCHALTER"
    id: PROGRAMMSCHALTER
    internal: true
    lambda: |-
      readSignal(&CanMembers[cm_manager], "PROGRAMMSCHALTER");
      return {};

  - platform: mqtt_subscribe
    name: "ANTILEGIONELLEN_STATE"
    internal: true
    id: ANTILEGIONELLEN
    topic: "heatingpump/MANAGER/ANTILEGIONELLEN/state"

  - platform: mqtt_subscribe
    name: "SOMMERBETRIEB_STATE"
    internal: true
    id: SOMMERBETRIEB
    topic: "heatingpump/MANAGER/SOMMERBETRIEB/state"

  - platform: mqtt_subscribe
    name: "WW_ECO_STATE"
    internal: true
    id: WW_ECO
    topic: "heatingpump/MANAGER/WW_ECO/state"


switch:
  - platform: template
    name: "Legionellenschutz"
    id: wpc_legionellen
    icon: "mdi:bacteria"
    optimistic: false
    lambda: |-
      if (id(ANTILEGIONELLEN).state == "on") {
        return true;
      } else if (id(ANTILEGIONELLEN).state == "off") {
        return false;
      }
      return {};
    turn_on_action:
      - lambda: 'writeSignal(&CanMembers[cm_manager], "ANTILEGIONELLEN", "on");'
      - delay: 4s # Wartezeit, damit die WP den Wert speichern kann
      - lambda: 'readSignal(&CanMembers[cm_manager], "ANTILEGIONELLEN");'
    turn_off_action:
      - lambda: 'writeSignal(&CanMembers[cm_manager], "ANTILEGIONELLEN", "off");'
      - delay: 4s
      - lambda: 'readSignal(&CanMembers[cm_manager], "ANTILEGIONELLEN");'

  - platform: template
    name: "Warm Wasser Eco"
    id: wpc_ww_eco
    icon: "mdi:leaf"
    optimistic: false
    lambda: |-
      if (id(WW_ECO).state == "on") {
        return true;
      } else if (id(WW_ECO).state == "off") {
        return false;
      }
      return {};
    turn_on_action:
      - lambda: 'writeSignal(&CanMembers[cm_manager], "WW_ECO", "on");'
      - delay: 4s # Wartezeit, damit die WP den Wert speichern kann
      - lambda: 'readSignal(&CanMembers[cm_manager], "WW_ECO");'
    turn_off_action:
      - lambda: 'writeSignal(&CanMembers[cm_manager], "WW_ECO", "off");'
      - delay: 4s
      - lambda: 'readSignal(&CanMembers[cm_manager], "WW_ECO");'

  - platform: template
    name: "Sommerbetrieb"
    id: wpc_sommerbetrieb
    icon: "mdi:weather-sunny"
    optimistic: false
    lambda: |-
      if (id(SOMMERBETRIEB).state == "on") {
        return true;
      } else if (id(SOMMERBETRIEB).state == "off") {
        return false;
      }
      return {};
    turn_on_action:
      - lambda: 'writeSignal(&CanMembers[cm_manager], "SOMMERBETRIEB", "on");'
      - delay: 4s # Wartezeit, damit die WP den Wert speichern kann
      - lambda: 'readSignal(&CanMembers[cm_manager], "SOMMERBETRIEB");'
    turn_off_action:
      - lambda: 'writeSignal(&CanMembers[cm_manager], "SOMMERBETRIEB", "off");'
      - delay: 4s
